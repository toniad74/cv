name: Generar PDFs automáticamente

on:
  push:
    branches: [main]
    paths:
      - 'toniamaya.html'
      - 'toni-amaya.html'
      - 'toniamaya-cat.html'
      - 'toni-amaya-cat.html'
      - 'generate-pdfs.js'
      - 'package.json'
      - '.github/workflows/generate-pdf.yml'

jobs:
  generate-pdfs:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar Google Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Instalar dependencias (rápido, sin Chromium)
        run: npm ci

      - name: Generar PDFs con Puppeteer
        run: node generate-pdfs.js

      - name: Subir PDFs al repositorio
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto: actualizar PDFs generados"
          file_pattern: "*.pdf"
